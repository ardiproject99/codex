<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flappy Bird Sederhana</title>
  <style>
    :root {
      --bg: #70c5ce;
      --ground: #ded895;
      --pipe: #4ec04e;
      --pipe-dark: #2b8b2b;
      --panel: rgba(0, 0, 0, 0.45);
      --text: #ffffff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(#8be0ff, #b5f1ff);
      color: var(--text);
    }

    .game-wrap {
      width: min(92vw, 430px);
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.2);
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      background: var(--bg);
    }

    .hud {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      display: flex;
      justify-content: space-between;
      font-weight: 700;
      text-shadow: 0 2px 4px rgba(0,0,0,.4);
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.35), rgba(0,0,0,0.08));
      padding: 16px;
    }

    .panel {
      background: var(--panel);
      padding: 18px 22px;
      border-radius: 12px;
      max-width: 300px;
    }

    .panel h1 {
      margin: 0 0 8px;
      font-size: 1.4rem;
    }

    .panel p {
      margin: 6px 0;
      line-height: 1.4;
    }

    .hint {
      font-size: 0.85rem;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="game-wrap">
    <canvas id="game" width="400" height="600" aria-label="Game Flappy Bird"></canvas>
    <div class="hud">
      <div>Skor: <span id="score">0</span></div>
      <div>Best: <span id="best">0</span></div>
    </div>
    <div class="overlay" id="overlay">
      <div class="panel">
        <h1>Flappy Bird</h1>
        <p>Tekan <strong>Spasi</strong> atau klik/tap untuk terbang.</p>
        <p>Lewati pipa dan dapatkan skor setinggi mungkin!</p>
        <p class="hint">Tekan Spasi / klik untuk mulai atau ulang.</p>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const overlay = document.getElementById('overlay');

    const world = {
      width: canvas.width,
      height: canvas.height,
      groundHeight: 90,
      gravity: 0.38,
      jump: -6.8,
      speed: 2.4,
      pipeGap: 150,
      pipeWidth: 66,
      pipeInterval: 1500,
      minPipeTop: 60,
      maxPipeBottom: 380,
      pipe: '#4ec04e',
      pipeDark: '#2b8b2b',
      ground: '#ded895',
    };

    let bird;
    let pipes;
    let score;
    let bestScore = Number(localStorage.getItem('flappy-best-score') || 0);
    let gameOver;
    let started;
    let lastPipeTime;
    let lastFrameTime;
    let frameId;

    const introOverlay = `
      <div class="panel">
        <h1>Flappy Bird</h1>
        <p>Tekan <strong>Spasi</strong> atau klik/tap untuk terbang.</p>
        <p>Lewati pipa dan dapatkan skor setinggi mungkin!</p>
        <p class="hint">Tekan Spasi / klik untuk mulai atau ulang.</p>
      </div>
    `;

    bestEl.textContent = bestScore;

    function resetGame() {
      bird = { x: 92, y: 260, radius: 14, velocity: 0, tilt: 0 };
      pipes = [];
      score = 0;
      gameOver = false;
      started = false;
      lastPipeTime = performance.now();
      lastFrameTime = performance.now();
      scoreEl.textContent = '0';
      overlay.innerHTML = introOverlay;
      overlay.style.display = 'grid';
      draw();
    }

    function spawnPipe(now) {
      const topHeight = rand(world.minPipeTop, world.maxPipeBottom - world.pipeGap);
      pipes.push({
        x: world.width,
        topHeight,
        bottomY: topHeight + world.pipeGap,
        passed: false,
      });
      lastPipeTime = now;
    }

    function rand(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function startGame() {
      if (!started) {
        started = true;
        overlay.style.display = 'none';
      }
      if (gameOver) {
        resetGame();
        started = true;
        overlay.style.display = 'none';
      }
      flap();
    }

    function flap() {
      bird.velocity = world.jump;
    }

    function setGameOver() {
      if (gameOver) return;
      gameOver = true;
      started = false;
      overlay.innerHTML = `
        <div class="panel">
          <h1>Game Over</h1>
          <p>Skor kamu: <strong>${score}</strong></p>
          <p>Skor terbaik: <strong>${bestScore}</strong></p>
          <p class="hint">Tekan Spasi / klik untuk main lagi.</p>
        </div>
      `;
      overlay.style.display = 'grid';
    }

    function update(now) {
      const dt = Math.min((now - lastFrameTime) / 16.6667, 2);
      lastFrameTime = now;

      if (!started || gameOver) {
        draw();
        frameId = requestAnimationFrame(update);
        return;
      }

      bird.velocity += world.gravity * dt;
      bird.y += bird.velocity * dt;
      bird.tilt = Math.max(-0.5, Math.min(1.2, bird.velocity / 10));

      if (now - lastPipeTime > world.pipeInterval) {
        spawnPipe(now);
      }

      pipes.forEach((pipe) => {
        pipe.x -= world.speed * dt;

        if (!pipe.passed && pipe.x + world.pipeWidth < bird.x) {
          pipe.passed = true;
          score += 1;
          scoreEl.textContent = String(score);
          if (score > bestScore) {
            bestScore = score;
            bestEl.textContent = String(bestScore);
            localStorage.setItem('flappy-best-score', String(bestScore));
          }
        }

        const hitPipeX = bird.x + bird.radius > pipe.x && bird.x - bird.radius < pipe.x + world.pipeWidth;
        const hitPipeY = bird.y - bird.radius < pipe.topHeight || bird.y + bird.radius > pipe.bottomY;

        if (hitPipeX && hitPipeY) {
          setGameOver();
        }
      });

      pipes = pipes.filter((pipe) => pipe.x + world.pipeWidth > -4);

      const hitCeiling = bird.y - bird.radius <= 0;
      const hitGround = bird.y + bird.radius >= world.height - world.groundHeight;
      if (hitCeiling || hitGround) {
        setGameOver();
      }

      draw();
      frameId = requestAnimationFrame(update);
    }

    function drawBackground() {
      ctx.fillStyle = '#70c5ce';
      ctx.fillRect(0, 0, world.width, world.height);

      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.beginPath();
      ctx.arc(65, 90, 32, 0, Math.PI * 2);
      ctx.arc(90, 82, 26, 0, Math.PI * 2);
      ctx.arc(115, 90, 30, 0, Math.PI * 2);
      ctx.fill();

      ctx.beginPath();
      ctx.arc(275, 130, 30, 0, Math.PI * 2);
      ctx.arc(300, 124, 23, 0, Math.PI * 2);
      ctx.arc(323, 132, 26, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawPipes() {
      pipes.forEach((pipe) => {
        ctx.fillStyle = world.pipe;
        ctx.fillRect(pipe.x, 0, world.pipeWidth, pipe.topHeight);
        ctx.fillRect(pipe.x, pipe.bottomY, world.pipeWidth, world.height - pipe.bottomY - world.groundHeight);

        ctx.fillStyle = world.pipeDark;
        ctx.fillRect(pipe.x - 4, pipe.topHeight - 20, world.pipeWidth + 8, 20);
        ctx.fillRect(pipe.x - 4, pipe.bottomY, world.pipeWidth + 8, 20);
      });
    }

    function drawGround() {
      ctx.fillStyle = world.ground;
      ctx.fillRect(0, world.height - world.groundHeight, world.width, world.groundHeight);

      ctx.fillStyle = '#c6be73';
      for (let i = 0; i < world.width; i += 26) {
        ctx.fillRect(i, world.height - world.groundHeight + 12, 14, 6);
      }
    }

    function drawBird() {
      ctx.save();
      ctx.translate(bird.x, bird.y);
      ctx.rotate(bird.tilt);

      ctx.fillStyle = '#ffd93d';
      ctx.beginPath();
      ctx.arc(0, 0, bird.radius, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#ff9f1a';
      ctx.beginPath();
      ctx.moveTo(10, -2);
      ctx.lineTo(24, 1);
      ctx.lineTo(10, 5);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(4, -5, 5, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath();
      ctx.arc(6, -5, 2, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function draw() {
      drawBackground();
      drawPipes();
      drawGround();
      drawBird();
    }

    window.addEventListener('keydown', (event) => {
      if (event.code === 'Space') {
        event.preventDefault();
        startGame();
      }
    });

    canvas.addEventListener('pointerdown', startGame);

    resetGame();
    frameId = requestAnimationFrame(update);

    window.addEventListener('beforeunload', () => {
      cancelAnimationFrame(frameId);
    });
  </script>
</body>
</html>
